name: Workflow Demo

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Print message
        run: echo "This is a demo of a workflow."

      - name: Can we deploy today?
        uses: timelfrink/shouldideploy-action@v1
        with:
          timezone: 'IST'

      - name: Deploy
        run: echo "Deploying to production..."